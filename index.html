<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrossWise - Intelligent Trade Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="container">
                <h1>CrossWise - Intelligent Trade Assistant</h1>
            </div>
        </header>

        <main class="container">
            <div class="chat-interface">
                <div class="chat-header">
                    <div class="chat-title">
                        <i class="fas fa-robot"></i>
                        <h2>AI Trade Assistant</h2>
                    </div>
                    <button id="darkModeToggle" class="btn-icon" aria-label="Toggle dark mode">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>

                <div id="chatMessages" class="chat-messages"></div>

                <div id="typingIndicator" class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>

                <form id="chatForm" class="chat-form">
                    <input
                        type="text"
                        id="userInput"
                        placeholder="Ask about trade regulations, HS codes, or export processes..."
                        aria-label="Enter your message"
                    />
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i>
                        <span>Send</span>
                    </button>
                </form>
            </div>

            <div class="chat-controls">
                <button id="clearChat" class="btn btn-secondary">
                    <i class="fas fa-trash"></i>
                    <span>Clear Chat</span>
                </button>
                <button id="exportChat" class="btn btn-secondary">
                    <i class="fas fa-download"></i>
                    <span>Export Chat</span>
                </button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
